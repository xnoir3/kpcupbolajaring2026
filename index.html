<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Score Bola Jaring - Piala KP Selangor 2026</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: white;
            background-image: url("background.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
            position: relative;
        }

        /* Lapisan Gelap Lutsinar Latar Belakang */
        .overlay {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.3);
        }

        /* Papan Markah Utama Premium (Glassmorphism) */
        .scoreboard {
            width: 95%;
            max-width: 1350px;
            background: rgba(15, 23, 42, 0.88);
            border-radius: 35px;
            padding: 35px 50px;
            box-sizing: border-box;
            border: 2px solid rgba(255, 217, 0, 0.35);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 0 30px rgba(255,217,0,0.05);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        /* Susunan Logo PDRM Asal */
        .logo-container {
            margin-bottom: 10px;
        }

        .logo-container img {
            height: 110px;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
        }

        /* Tajuk Kejohanan */
        .tournament-title {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 2.5rem;
            color: #FFD700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            line-height: 1.2;
            text-shadow: 2px 3px 6px rgba(0,0,0,0.7);
        }

        /* Label Nombor Perlawanan */
        .match-number {
            font-family: 'Arial Black', sans-serif;
            font-size: 1.15rem;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 24px;
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Kontainer Utama Pasukan & Skor */
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 20px;
        }

        /* Kotak Komponen Pasukan */
        .team-box {
            width: 38%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .team {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 2.8rem;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 2px 3px 5px rgba(0,0,0,0.6);
            letter-spacing: 1px;
            line-height: 1.1;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* Paparan Kotak Skor Besar Gergasi */
        .score {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 9.5rem;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #FFD700;
            padding: 10px 45px;
            border-radius: 25px;
            min-width: 170px;
            text-align: center;
            box-shadow: inset 0 0 25px rgba(0,0,0,0.9), 0 10px 25px rgba(0,0,0,0.5), 0 0 20px rgba(255, 215, 0, 0.15);
            line-height: 1;
            border: 1px solid rgba(255, 217, 0, 0.2);
        }

        /* Seksyen Tengah (Masa & Status Perlawanan) */
        .middle {
            width: 24%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 0 10px;
        }

        .status {
            font-family: 'Arial Black', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            color: #ef4444;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 6px 16px;
            border-radius: 8px;
            line-height: 1.3;
            min-height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: pulse 2s infinite alternate;
        }

        /* Paparan Jam Pemasa (Timer) */
        .timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 4.5rem;
            font-weight: bold;
            color: #2ecc71;
            background: #090d16;
            padding: 10px 25px;
            border-radius: 15px;
            border: 2px solid #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3), inset 0 0 10px rgba(0,0,0,0.8);
            letter-spacing: 2px;
            line-height: 1;
        }

        @keyframes pulse {
            0% { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.03); }
        }

        /* Butang Navigasi ke Jadual Perlawanan (Top-Right Floating) */
        .nav-floating {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
        }

        .btn-schedule {
            background: linear-gradient(135deg, #FFD700, #cca100);
            color: #000000;
            border: none;
            padding: 14px 28px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.45);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: sans-serif;
        }

        .btn-schedule:hover {
            background: #ffffff;
            box-shadow: 0 6px 25px rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
            color: #000000;
        }

        /* MEDIA QUERIES RESPONSIVE */
        @media (max-width: 1024px) {
            .tournament-title { font-size: 2rem; }
            .team { font-size: 2rem; min-height: 50px; }
            .score { font-size: 7rem; min-width: 130px; padding: 10px 30px; }
            .timer { font-size: 3.5rem; padding: 8px 18px; }
            .logo-container img { height: 90px; }
        }

        @media (max-width: 768px) {
            body { overflow-y: auto; }
            .overlay { height: auto; min-height: 100vh; padding: 80px 15px 40px 15px; }
            .scoreboard { padding: 25px 20px; border-radius: 25px; }
            .teams { flex-direction: column; gap: 30px; }
            .team-box { width: 100%; }
            .middle { width: 100%; order: -1; margin-bottom: 10px; }
            .nav-floating { top: 15px; right: 15px; width: calc(100% - 30px); text-align: center; }
            .btn-schedule { width: 100%; justify-content: center; box-sizing: border-box; }
            .score { font-size: 6.5rem; }
        }
    </style>
</head>
<body>

<div class="nav-floating">
    <a href="jadual.html" class="btn-schedule">
        📅 Lihat Jadual Perlawanan
    </a>
</div>

<div class="overlay">
    <div class="scoreboard">
        
        <div class="logo-container">
            <img src="logo_pdrm.png" alt="Logo PDRM">
        </div>
        
        <div class="tournament-title">
            Perlawanan Bola Jaring<br>Piala KP Selangor 2026
        </div>

        <div class="match-number" id="matchNumber">PERLAWANAN --</div>

        <div class="teams">
            
            <div class="team-box">
                <div class="team" id="teamA">PASUKAN A</div>
                <div class="score" id="scoreA">0</div>
            </div>

            <div class="middle">
                <div class="status" id="status">MULA PERLAWANAN</div>
                <div class="timer" id="timer">00:00</div>
            </div>

            <div class="team-box">
                <div class="team" id="teamB">PASUKAN B</div>
                <div class="score" id="scoreB">0</div>
            </div>

        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA_r3S48RffSWJ5Zfx6DuNbLsQe1NiqxNk",
        authDomain: "kpcupbolajaring2026.firebaseapp.com",
        projectId: "kpcupbolajaring2026",
        storageBucket: "kpcupbolajaring2026.firebasestorage.app",
        messagingSenderId: "1003385616201",
        appId: "1:1003385616201:web:6d475aa234b96380a78c98",
        measurementId: "G-RQ793SKH7C",
        databaseURL: "https://kpcupbolajaring2026-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Fungsi khas untuk membersihkan kod kumpulan (e.g. "IPD KLIA [D1]" atau "IPD KLIA D1" -> "IPD KLIA")
    function cleanTeamName(name) {
        if (!name) return "";
        // Membuang corak [A1], [B2], D1, C3 dsb termasuk pembuka/penutup kurungan
        return name.replace(/\[[A-Z]\d+\]/gi, '').replace(/\b[A-Z]\d+\b/gi, '').trim();
    }

    database.ref('netballLive').on('value', (snapshot) => {
        const data = snapshot.val();
        if(!data) return;

        if(data.matchNumber && document.getElementById("matchNumber")) {
            document.getElementById("matchNumber").innerText = "PERLAWANAN " + data.matchNumber;
        }
        
        // Memaparkan nama bersih (Tanpa Kod Kumpulan) pada Skrin index.html
        if(document.getElementById("teamA")) document.getElementById("teamA").innerText = cleanTeamName(data.teamA);
        if(document.getElementById("teamB")) document.getElementById("teamB").innerText = cleanTeamName(data.teamB);
        
        if(document.getElementById("scoreA")) document.getElementById("scoreA").innerText = (data.scoreA !== undefined) ? data.scoreA : 0;
        if(document.getElementById("scoreB")) document.getElementById("scoreB").innerText = (data.scoreB !== undefined) ? data.scoreB : 0;
        
        if(document.getElementById("status")) document.getElementById("status").innerText = data.status || "BELUM MULA";
        if(document.getElementById("timer")) document.getElementById("timer").innerText = data.timer || "10:00";

        // Logik kelas status hiasan asal
        let currentStatus = String(data.status).toUpperCase();
        const elStatus = document.getElementById("status");
        if(elStatus) {
            if(currentStatus === "LIVE") elStatus.className = "status-badge live";
            else if(currentStatus === "PAUSE") elStatus.className = "status-badge pause";
            else if(currentStatus === "REHAT") elStatus.className = "status-badge rehat";
            else if(currentStatus === "TAMAT") elStatus.className = "status-badge tamat";
            else elStatus.className = "status";
        }
    });
</script>

</body>
</html>
