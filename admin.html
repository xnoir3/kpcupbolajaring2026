<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin Bola Jaring</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#0b1020;
    color:white;
    margin:0;
    padding:30px;
    max-width:1000px;
    margin:auto;
}

.card{
    background:#18233d;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
}

h1{
    text-align:center;
}

label{
    display:block;
    margin-top:10px;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    margin-top:5px;
}

.score{
    font-size:90px;
    text-align:center;
    font-weight:bold;
    margin:15px 0;
}

button{
    border:none;
    border-radius:10px;
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
    margin:5px;
}

.plus{
    background:#00c853;
    color:white;
}

.minus{
    background:#d50000;
    color:white;
}

.control{
    background:#2196f3;
    color:white;
}

#status{
    text-align:center;
    font-size:40px;
    font-weight:bold;
}

#timer{
    text-align:center;
    font-size:70px;
    font-weight:bold;
    margin-top:10px;
}

</style>

</head>

<body>

<h1>PANEL ADMIN LIVE SCORE</h1>

<div class="card">

<label>Pasukan A</label>
<input id="teamA" value="PASUKAN A">

<div class="score" id="scoreA">0</div>

<button class="plus" onclick="changeScore('A',1)">+1</button>
<button class="minus" onclick="changeScore('A',-1)">-1</button>

<hr>

<label>Pasukan B</label>
<input id="teamB" value="PASUKAN B">

<div class="score" id="scoreB">0</div>

<button class="plus" onclick="changeScore('B',1)">+1</button>
<button class="minus" onclick="changeScore('B',-1)">-1</button>

</div>

<div class="card">

<div id="status">
SEPARUH MASA PERTAMA
</div>

<div id="timer">
10:00
</div>

<center>

<button class="control" onclick="startTimer()">
MULA
</button>

<button class="control" onclick="pauseTimer()">
PAUSE
</button>

<button class="control" onclick="resetTimer()">
RESET
</button>

</center>

</div>

<script>

let scoreA = 0;
let scoreB = 0;

let phase = 1;

/*
1 = Separuh Masa Pertama
2 = Rehat
3 = Separuh Masa Kedua
4 = Tamat
*/

let seconds = 600;

let timerInterval;

function changeScore(team,val){

    if(team==="A"){

        scoreA += val;

        if(scoreA < 0) scoreA = 0;

        document.getElementById("scoreA").innerText = scoreA;
    }

    if(team==="B"){

        scoreB += val;

        if(scoreB < 0) scoreB = 0;

        document.getElementById("scoreB").innerText = scoreB;
    }

    saveData();
}

function startTimer(){

    clearInterval(timerInterval);

    timerInterval = setInterval(()=>{

        if(seconds > 0){

            seconds--;

            updateTimer();

            saveData();

        }else{

            nextPhase();

        }

    },1000);

}

function pauseTimer(){

    clearInterval(timerInterval);

}

function resetTimer(){

    clearInterval(timerInterval);

    phase = 1;

    seconds = 600;

    document.getElementById("status").innerText =
    "SEPARUH MASA PERTAMA";

    updateTimer();

    saveData();

}

function nextPhase(){

    if(phase === 1){

        phase = 2;

        seconds = 180;

        document.getElementById("status").innerText =
        "REHAT";

        updateTimer();

        return;
    }

    if(phase === 2){

        phase = 3;

        seconds = 600;

        document.getElementById("status").innerText =
        "SEPARUH MASA KEDUA";

        updateTimer();

        return;
    }

    if(phase === 3){

        phase = 4;

        clearInterval(timerInterval);

        document.getElementById("status").innerText =
        "TAMAT";

        document.getElementById("timer").innerText =
        "00:00";

        saveData();

    }

}

function updateTimer(){

    let min = Math.floor(seconds / 60);

    let sec = seconds % 60;

    document.getElementById("timer").innerText =

    String(min).padStart(2,"0")

    + ":"

    + String(sec).padStart(2,"0");

}

function saveData(){

    const data = {

        teamA: document.getElementById("teamA").value,

        teamB: document.getElementById("teamB").value,

        scoreA: scoreA,

        scoreB: scoreB,

        status: document.getElementById("status").innerText,

        timer: document.getElementById("timer").innerText

    };

    localStorage.setItem(
        "netballLive",
        JSON.stringify(data)
    );

}

document.getElementById("teamA").addEventListener(
"keyup",saveData
);

document.getElementById("teamB").addEventListener(
"keyup",saveData
);

saveData();

</script>

</body>
</html>
