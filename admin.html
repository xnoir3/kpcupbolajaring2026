        body { font-family: Arial, sans-serif; padding: 20px; background: #0b1020; color: white; max-width: 1000px; margin: auto; }

        h2 { text-align: center; margin-top: 0; color: #FFD700; }
        .match-box { background: #1f2d4d; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #2a3b63; margin-bottom: 15px; }
        .flex-row { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 15px; }
        .card { flex: 1; background: #1f2d4d; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #2a3b63; }
        input[type="text"], select { width: 90%; padding: 10px; font-size: 16px; font-weight: bold; text-align: center; border: 1px solid #3a4b73; border-radius: 8px; background: #0b1020; color: white; }
        .display-score { font-size: 55px; font-weight: bold; margin: 15px 0; color: #FFD700; }
        .btn { padding: 10px 14px; font-size: 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; margin: 4px 2px; }
        .btn-plus { background: #2ecc71; color: white; }
        .btn-minus { background: #e74c3c; color: white; }
        .btn-control { background: #34495e; color: white; width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; border-radius: 8px; font-weight: bold; }
        .time-box { text-align: center; margin: 20px 0; padding: 15px; background: #0b1020; border-radius: 12px; border: 1px solid #2a3b63; }
        #timer { font-size: 45px; font-weight: bold; font-family: monospace; color: #2ecc71; }

            </select>

            <button class="btn btn-plus" style="background: #27ae60;" onclick="changeScore('A', 2)">+2</button>
            <button class="btn btn-plus" style="background: #16a085;" onclick="changeScore('A', 3)">+3</button>
            <button class="btn btn-minus" onclick="changeScore('A', -1)">-1</button>
        </div>
        
        <div class="card">

            <button class="btn btn-plus" style="background: #16a085;" onclick="changeScore('B', 3)">+3</button>
            <button class="btn btn-minus" onclick="changeScore('B', -1)">-1</button>
        </div>
    </div>

    <div class="time-box">
        <div id="status">SEPARUH MASA PERTAMA</div>
        <div id="timer">10:00</div>
    </div>

    <button class="btn btn-control" style="background:#27ae60;" onclick="startTimer()">MULA PEMASA (START)</button>

    <button class="btn btn-control" style="background:#2980b9;" onclick="nextPhase()">FASA SETERUSNYA (NEXT PHASE)</button>
    <button class="btn btn-control" style="background:#c0392b;" onclick="resetTimer()">RESET SEMUA (RESET)</button>

// Bina drop-down pilihan perlawanan 1-36
window.onload = function() {
    const select = document.getElementById("matchSelect");
    for (let i = 1; i <= 36; i++) {
        let opt = document.createElement("option");
        opt.value = i;
        opt.innerText = "PERLAWANAN " + i;
        select.appendChild(opt);
    }
    
    document.getElementById("teamA").addEventListener("keyup", saveData);
    document.getElementById("teamB").addEventListener("keyup", saveData);
    
    // Ambil data permulaan perlawanan aktif
    database.ref('netballLive/currentMatch').once('value', (snap) => {
        if(snap.val()) {
            document.getElementById("matchSelect").value = snap.val();
        }
        loadSelectedMatch();
    });
}

function setupDefaultJadual() {
    if(confirm("Adakah anda pasti mahu memasukkan/reset jadual asal 36 perlawanan ke database?")) {
        database.ref('perlawananList').set(jadualAsal);
        alert("Jadual berjaya dimasukkan!");
        loadSelectedMatch();
    }
}

function loadSelectedMatch() {
    let matchId = document.getElementById("matchSelect").value;
    database.ref('perlawananList/' + matchId).once('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            scoreA = data.scoreA || 0;
            scoreB = data.scoreB || 0;
            document.getElementById("teamA").value = data.teamA;
            document.getElementById("teamB").value = data.teamB;
            document.getElementById("scoreA").innerText = scoreA;
            document.getElementById("scoreB").innerText = scoreB;
            
            // Sync juga data semasa pemasa sekiranya ada
            database.ref('netballLive').once('value', (liveSnap) => {
                let liveData = liveSnap.val();
                if(liveData && liveData.currentMatch == matchId) {
                    document.getElementById("status").innerText = liveData.status;
                    document.getElementById("timer").innerText = liveData.timer;
                    seconds = timeToSeconds(liveData.timer);
                } else {
                    document.getElementById("status").innerText = "SEPARUH MASA PERTAMA";
                    document.getElementById("timer").innerText = "10:00";
                    seconds = 600;
                }
            });
        }
    });
}

function changeScore(team, val){
    if(team === "A") { scoreA += val; if(scoreA < 0) scoreA = 0; document.getElementById("scoreA").innerText = scoreA; }
    if(team === "B") { scoreB += val; if(scoreB < 0) scoreB = 0; document.getElementById("scoreB").innerText = scoreB; }
    saveData();
}

function startTimer(){
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if(seconds > 0){ seconds--; updateTimer(); saveData(); } else { nextPhase(); }
    }, 1000);
}

function pauseTimer(){ clearInterval(timerInterval); }
function resetTimer(){ clearInterval(timerInterval); phase = 1; seconds = 600; document.getElementById("status").innerText = "SEPARUH MASA PERTAMA"; updateTimer(); saveData(); }

function nextPhase(){
    let statusText = document.getElementById("status").innerText;
    if(statusText === "SEPARUH MASA PERTAMA"){ seconds = 180; document.getElementById("status").innerText = "REHAT"; }
    else if(statusText === "REHAT"){ seconds = 600; document.getElementById("status").innerText = "SEPARUH MASA KEDUA"; }
    else { clearInterval(timerInterval); document.getElementById("status").innerText = "TAMAT"; document.getElementById("timer").innerText = "00:00"; }
    updateTimer(); saveData();
}

function updateTimer(){
    let min = Math.floor(seconds / 60); let sec = seconds % 60;
    document.getElementById("timer").innerText = String(min).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}

function timeToSeconds(tStr) { if(!tStr || !tStr.includes(":")) return 600; let p = tStr.split(":"); return (parseInt(p[0])*60) + parseInt(p[1]); }

function saveData(){
    let matchId = document.getElementById("matchSelect").value;
    let tA = document.getElementById("teamA").value;
    let tB = document.getElementById("teamB").value;
    let stat = document.getElementById("status").innerText;
    let tmr = document.getElementById("timer").innerText;

    // Simpan ke arkib senarai perlawanan
    database.ref('perlawananList/' + matchId).update({
        teamA: tA, teamB: tB, scoreA: scoreA, scoreB: scoreB,
        status: (stat === "TAMAT") ? "TAMAT" : "LIVE"
    });

    // Simpan ke paparan skrin utama LIVE
    database.ref('netballLive').set({
        currentMatch: matchId,
        matchNumber: "PERLAWANAN " + matchId,
        teamA: tA, teamB: tB, scoreA: scoreA, scoreB: scoreB, status: stat, timer: tmr
    });
}
