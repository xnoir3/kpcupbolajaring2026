<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Scoreboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #0b1020; color: white; max-width: 1000px; margin: auto; }
        .admin-box { max-width: 600px; margin: 40px auto; background: #18233d; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-top: 0; color: #FFD700; }
        .match-box { background: #1f2d4d; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #2a3b63; margin-bottom: 15px; }
        .flex-row { display: flex; justify-content: space-between; gap: 15px; margin-bottom: 15px; }
        .card { flex: 1; background: #1f2d4d; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #2a3b63; }
        input[type="text"] { width: 90%; padding: 10px; font-size: 16px; font-weight: bold; text-align: center; border: 1px solid #3a4b73; border-radius: 8px; background: #0b1020; color: white; }
        .display-score { font-size: 55px; font-weight: bold; margin: 15px 0; color: #FFD700; }
        .btn { padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; margin: 4px; }
        .btn-plus { background: #2ecc71; color: white; }
        .btn-minus { background: #e74c3c; color: white; }
        .btn-control { background: #34495e; color: white; width: 100%; padding: 12px; margin-top: 10px; font-size: 16px; border-radius: 8px; font-weight: bold; }
        .time-box { text-align: center; margin: 20px 0; padding: 15px; background: #0b1020; border-radius: 12px; border: 1px solid #2a3b63; }
        #timer { font-size: 45px; font-weight: bold; font-family: monospace; color: #2ecc71; }
        #status { font-weight: bold; color: #a4b3d6; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>PANEL KAWALAN ADMIN</h2>
    
    <div class="match-box">
        <label style="display:block; margin-bottom:8px; font-weight:bold; color:#a4b3d6;">BILANGAN PERLAWANAN:</label>
        <input type="text" id="matchNumber" value="PERLAWANAN 1" placeholder="Contoh: PERLAWANAN 1">
    </div>

    <div class="flex-row">
        <div class="card">
            <input type="text" id="teamA" value="PASUKAN A">
            <div class="display-score" id="scoreA">0</div>
            <button class="btn btn-plus" onclick="changeScore('A', 1)">+1</button>
            <button class="btn btn-minus" onclick="changeScore('A', -1)">-1</button>
        </div>
        
        <div class="card">
            <input type="text" id="teamB" value="PASUKAN B">
            <div class="display-score" id="scoreB">0</div>
            <button class="btn btn-plus" onclick="changeScore('B', 1)">+1</button>
            <button class="btn btn-minus" onclick="changeScore('B', -1)">-1</button>
        </div>
    </div>

    <div class="time-box">
        <div id="status">SEPARUH MASA PERTAMA</div>
        <div id="timer">10:00</div>
    </div>

    <button class="btn btn-control" style="background:#27ae60;" onclick="startTimer()">MULA PEMASA (START)</button>
    <button class="btn btn-control" style="background:#f39c12;" onclick="pauseTimer()">HENTI SEKETIKA (PAUSE)</button>
    <button class="btn btn-control" style="background:#2980b9;" onclick="nextPhase()">FASA SETERUSNYA (NEXT PHASE)</button>
    <button class="btn btn-control" style="background:#c0392b;" onclick="resetTimer()">RESET SEMUA (RESET)</button>
</div>

<script>
// Konfigurasi Firebase kpcupbolajaring2026
const firebaseConfig = {
  apiKey: "AIzaSyA_r3S48RffSWJ5Zfx6DuNbLsQe1NiqxNk",
  authDomain: "kpcupbolajaring2026.firebaseapp.com",
  projectId: "kpcupbolajaring2026",
  storageBucket: "kpcupbolajaring2026.firebasestorage.app",
  messagingSenderId: "1003385616201",
  appId: "1:1003385616201:web:6d475aa234b96380a78c98",
  measurementId: "G-RQ793SKH7C",
  databaseURL: "https://kpcupbolajaring2026-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

let scoreA = 0;
let scoreB = 0;
let phase = 1;
let seconds = 600; 
let timerInterval;

function timeToSeconds(timeStr) {
    if (!timeStr || !timeStr.includes(":")) return 600;
    const parts = timeStr.split(":");
    const minutes = parseInt(parts[0], 10) || 0;
    const secs = parseInt(parts[1], 10) || 0;
    return (minutes * 60) + secs;
}

// Tarik data asal dari Firebase semasa admin baru dibuka
database.ref('netballLive').once('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
        scoreA = parseInt(data.scoreA) || 0;
        scoreB = parseInt(data.scoreB) || 0;
        
        if(data.matchNumber && document.getElementById("matchNumber")) document.getElementById("matchNumber").value = data.matchNumber;
        if(document.getElementById("teamA")) document.getElementById("teamA").value = data.teamA || "PASUKAN A";
        if(document.getElementById("teamB")) document.getElementById("teamB").value = data.teamB || "PASUKAN B";
        if(document.getElementById("scoreA")) document.getElementById("scoreA").innerText = scoreA;
        if(document.getElementById("scoreB")) document.getElementById("scoreB").innerText = scoreB;
        if(document.getElementById("status")) document.getElementById("status").innerText = data.status || "SEPARUH MASA PERTAMA";
        if(document.getElementById("timer")) document.getElementById("timer").innerText = data.timer || "10:00";
        
        if (data.timer) {
            seconds = timeToSeconds(data.timer);
        }

        if (data.status === "REHAT") phase = 2;
        else if (data.status === "SEPARUH MASA KEDUA") phase = 3;
        else if (data.status === "TAMAT") phase = 4;
    }
});

function changeScore(team, val){
    if(team === "A"){
        scoreA += val;
        if(scoreA < 0) scoreA = 0;
        if(document.getElementById("scoreA")) document.getElementById("scoreA").innerText = scoreA;
    }
    if(team === "B"){
        scoreB += val;
        if(scoreB < 0) scoreB = 0;
        if(document.getElementById("scoreB")) document.getElementById("scoreB").innerText = scoreB;
    }
    saveData();
}

function startTimer(){
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if(seconds > 0){
            seconds--;
            updateTimer();
            saveData();
        } else {
            nextPhase();
        }
    }, 1000);
}

function pauseTimer(){
    clearInterval(timerInterval);
}

function resetTimer(){
    clearInterval(timerInterval);
    phase = 1;
    seconds = 600;
    if(document.getElementById("status")) document.getElementById("status").innerText = "SEPARUH MASA PERTAMA";
    updateTimer();
    saveData();
}

function nextPhase(){
    if(phase === 1){
        phase = 2;
        seconds = 180; // 3 minit rehat
        if(document.getElementById("status")) document.getElementById("status").innerText = "REHAT";
        updateTimer();
        saveData();
        return;
    }
    if(phase === 2){
        phase = 3;
        seconds = 600; // 10 minit separuh masa kedua
        if(document.getElementById("status")) document.getElementById("status").innerText = "SEPARUH MASA KEDUA";
        updateTimer();
        saveData();
        return;
    }
    if(phase === 3){
        phase = 4;
        clearInterval(timerInterval);
        if(document.getElementById("status")) document.getElementById("status").innerText = "TAMAT";
        if(document.getElementById("timer")) document.getElementById("timer").innerText = "00:00";
        saveData();
    }
}

function updateTimer(){
    let min = Math.floor(seconds / 60);
    let sec = seconds % 60;
    let formattedTime = String(min).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
    if(document.getElementById("timer")) document.getElementById("timer").innerText = formattedTime;
}

function saveData(){
    const matchNumberEl = document.getElementById("matchNumber");
    const teamAEl = document.getElementById("teamA");
    const teamBEl = document.getElementById("teamB");
    const statusEl = document.getElementById("status");
    const timerEl = document.getElementById("timer");

    const data = {
        matchNumber: matchNumberEl ? matchNumberEl.value : "PERLAWANAN 1",
        teamA: teamAEl ? teamAEl.value : "PASUKAN A",
        teamB: teamBEl ? teamBEl.value : "PASUKAN B",
        scoreA: scoreA,
        scoreB: scoreB,
        status: statusEl ? statusEl.innerText : "SEPARUH MASA PERTAMA",
        timer: timerEl ? timerEl.innerText : "10:00"
    };

    database.ref('netballLive').set(data);
}

window.onload = function() {
    const matchNumberEl = document.getElementById("matchNumber");
    const teamAEl = document.getElementById("teamA");
    const teamBEl = document.getElementById("teamB");
    
    if(matchNumberEl) matchNumberEl.addEventListener("keyup", saveData);
    if(teamAEl) teamAEl.addEventListener("keyup", saveData);
    if(teamBEl) teamBEl.addEventListener("keyup", saveData);
}
</script>

</body>
</html>
