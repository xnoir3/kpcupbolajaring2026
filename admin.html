<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Scoreboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #0b1020; color: white; max-width: 1000px; margin: auto; }
        .admin-box { max-width: 600px; margin: 40px auto; background: #18233d; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-top: 0; color: #FFD700; font-size: 1.2rem; }
        .match-box { background: #1f2d4d; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #2a3b63; margin-bottom: 15px; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; gap: 10px; }
        .team-input-box { flex: 1; text-align: center; }
        .team-input-box label { display: block; font-size: 0.85rem; color: #cbd5e1; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #34495e; background: #0f172a; color: white; box-sizing: border-box; }
        
        .score-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 15px 0; }
        .score-display { font-size: 2.5rem; font-family: 'Impact', sans-serif; color: #FFD700; min-width: 60px; text-align: center; background: #0f172a; padding: 5px 15px; border-radius: 10px; border: 1px solid #2a3b63; }
        .score-controls { display: flex; flex-direction: column; gap: 5px; }
        .score-btn { background: #34495e; border: none; color: white; padding: 8px 12px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        .score-btn.plus { background: #2ecc71; }
        
        .btn-group { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        button.action-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-yellow { background: #f1c40f; color: black; }
        .btn-blue { background: #3498db; color: white; }
        .status-badge { font-weight: bold; font-size: 1.1rem; padding: 6px 15px; border-radius: 50px; background: #7f8c8d; display: inline-block; text-transform: uppercase; }
        .timer-display { font-size: 3rem; font-family: monospace; font-weight: bold; color: #2ecc71; margin: 10px 0; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>KEMAS KINI PERLAWANAN</h2>
    
    <select id="matchSelect" onchange="loadMatchSetup()">
        <script>for(let i=1; i<=36; i++){ document.write(`<option value="${i}">Perlawanan ${i}</option>`); }</script>
    </select>

    <div class="flex-row">
        <div class="team-input-box"><label>Pasukan A</label><input type="text" id="teamA"></div>
        <div style="margin-top:20px; font-weight:bold;">VS</div>
        <div class="team-input-box"><label>Pasukan B</label><input type="text" id="teamB"></div>
    </div>

    <div class="match-box">
        <div id="status" class="status-badge">BELUM MULA</div>
        <div class="timer-display" id="timer">10:00</div>
    </div>

    <div class="score-container">
        <div class="score-controls">
            <button class="score-btn plus" onclick="changeScore('A', 1)">+1</button>
            <button class="score-btn" onclick="changeScore('A', -1)">-1</button>
        </div>
        <div class="score-display" id="scoreA">0</div>
        <div style="font-weight:bold; font-size:1.5rem;">:</div>
        <div class="score-display" id="scoreB">0</div>
        <div class="score-controls">
            <button class="score-btn plus" onclick="changeScore('B', 1)">+1</button>
            <button class="score-btn" onclick="changeScore('B', -1)">-1</button>
        </div>
    </div>

    <div class="btn-group">
        <button class="action-btn btn-green" onclick="startTimer(600, 'SEPARUH MASA PERTAMA')">Separuh Masa Pertama (10m)</button>
        <button class="action-btn btn-blue" onclick="startTimer(180, 'REHAT')">REHAT (3m)</button>
        <button class="action-btn btn-green" onclick="startTimer(600, 'SEPARUH MASA KEDUA')">Separuh Masa Kedua (10m)</button>
        <button class="action-btn btn-green" onclick="resumeTimer()">START</button>
        <button class="action-btn btn-yellow" onclick="pauseTimer()">PAUSE</button>
        <button class="action-btn btn-red" onclick="endMatch()">TAMAT PERLAWANAN</button>
        <button class="action-btn" onclick="resetAllFields()" style="background:#7f8c8d;">RESET SEMUA</button>
    </div>
</div>

<script>
    const matchTeams = {
        1: { a: "IPD KLIA", b: "IPD SUBANG JAYA" },
        2: { a: "IPD SUNGAI BULOH", b: "IPD GOMBAK" },
        3: { a: "IPD KAJANG", b: "IPD KUALA SELANGOR" },
        4: { a: "IPD SERDANG", b: "IPK SELANGOR" },
        5: { a: "IPD KLANG SELATAN", b: "IPD SABAK BERNAM" },
        6: { a: "IPD PETALING JAYA", b: "IPD KLIA" },
        7: { a: "IPD SUBANG JAYA", b: "IPD SUNGAI BULOH" },
        8: { a: "IPD SEPANG", b: "IPD AMPANG JAYA" },
        9: { a: "IPD KUALA LANGAT", b: "IPD KLANG UTARA" },
        10: { a: "IPD HULU SELANGOR", b: "IPD SHAH ALAM" },
        11: { a: "IPD GOMBAK", b: "IPD PETALING JAYA" },
        12: { a: "IPD KAJANG", b: "IPD SEPANG" },
        13: { a: "IPD SERDANG", b: "IPD KUALA LANGAT" },
        14: { a: "IPD KLANG SELATAN", b: "IPD HULU SELANGOR" },
        15: { a: "IPD KUALA SELANGOR", b: "IPD AMPANG JAYA" },
        16: { a: "IPK SELANGOR", b: "IPD KLANG UTARA" },
        17: { a: "IPD SABAK BERNAM", b: "IPD SHAH ALAM" },
        18: { a: "IPD KLIA", b: "IPD SUNGAI BULOH" },
        19: { a: "IPD SUBANG JAYA", b: "IPD PETALING JAYA" },
        20: { a: "IPD KAJANG", b: "IPD AMPANG JAYA" },
        21: { a: "IPD SERDANG", b: "IPD KLANG UTARA" },
        22: { a: "IPD KLANG SELATAN", b: "IPD SHAH ALAM" },
        23: { a: "IPD GOMBAK", b: "IPD KLIA" },
        24: { a: "IPD SUNGAI BULOH", b: "IPD PETALING JAYA" },
        25: { a: "IPD KUALA SELANGOR", b: "IPD SEPANG" },
        26: { a: "IPK SELANGOR", b: "IPD KUALA LANGAT" },
        27: { a: "IPD SABAK BERNAM", b: "IPD HULU SELANGOR" },
        28: { a: "IPD SUBANG JAYA", b: "IPD GOMBAK" },
        29: { a: "JOHAN KUMPULAN A", b: "NAIB JOHAN KUMPULAN C" },
        30: { a: "JOHAN KUMPULAN D", b: "NAIB JOHAN KUMPULAN B" },
        31: { a: "JOHAN KUMPULAN B", b: "NAIB JOHAN KUMPULAN D" },
        32: { a: "JOHAN KUMPULAN C", b: "NAIB JOHAN KUMPULAN A" },
        33: { a: "PEMENANG PERLAWANAN 29", b: "PEMENANG PERLAWANAN 30" },
        34: { a: "PEMENANG PERLAWANAN 31", b: "PEMENANG PERLAWANAN 32" },
        35: { a: "KALAH PERLAWANAN 33 (3/4)", b: "KALAH PERLAWANAN 34 (3/4)" },
        36: { a: "PEMENANG PERLAWANAN 33", b: "PEMENANG PERLAWANAN 34" }
    };

    const firebaseConfig = { 
        projectId: "kpcupbolajaring2026",
        databaseURL: "https://kpcupbolajaring2026-default-rtdb.asia-southeast1.firebasedatabase.app/" 
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let scoreA = 0, scoreB = 0, seconds = 600, timerInterval = null;

    function loadMatchSetup() {
        let matchId = document.getElementById("matchSelect").value;
        if(matchTeams[matchId]) {
            document.getElementById("teamA").value = matchTeams[matchId].a;
            document.getElementById("teamB").value = matchTeams[matchId].b;
        }
        database.ref('perlawananList/' + matchId).once('value', (snap) => {
            let data = snap.val() || {};
            scoreA = data.scoreA || 0; scoreB = data.scoreB || 0;
            document.getElementById("scoreA").innerText = scoreA;
            document.getElementById("scoreB").innerText = scoreB;
            document.getElementById("status").innerText = data.status || "BELUM MULA";
            document.getElementById("timer").innerText = data.timer || "10:00";
        });
    }

    function startTimer(duration, status) {
        clearInterval(timerInterval);
        seconds = duration;
        document.getElementById("status").innerText = status;
        timerInterval = setInterval(() => {
            if(seconds > 0) {
                seconds--;
                let m = Math.floor(seconds/60), s = seconds%60;
                document.getElementById("timer").innerText = String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
                saveData();
            } else { clearInterval(timerInterval); }
        }, 1000);
    }

    function resumeTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            if(seconds > 0) {
                seconds--;
                let m = Math.floor(seconds/60), s = seconds%60;
                document.getElementById("timer").innerText = String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
                saveData();
            } else { clearInterval(timerInterval); }
        }, 1000);
    }

    function pauseTimer() { clearInterval(timerInterval); timerInterval = null; saveData(); }
    function endMatch() { clearInterval(timerInterval); timerInterval = null; document.getElementById("status").innerText = "TAMAT"; saveData(); }

    function changeScore(team, val) {
        if(team == 'A') scoreA = Math.max(0, scoreA + val); else scoreB = Math.max(0, scoreB + val);
        document.getElementById("scoreA").innerText = scoreA;
        document.getElementById("scoreB").innerText = scoreB;
        saveData();
    }

    function resetAllFields() {
        if(confirm("Reset semua data?")) {
            scoreA = 0; scoreB = 0; seconds = 600;
            document.getElementById("scoreA").innerText = 0;
            document.getElementById("scoreB").innerText = 0;
            document.getElementById("timer").innerText = "10:00";
            document.getElementById("status").innerText = "BELUM MULA";
            saveData();
        }
    }

    function saveData() {
        let data = {
            matchNumber: document.getElementById("matchSelect").value,
            teamA: document.getElementById("teamA").value,
            teamB: document.getElementById("teamB").value,
            scoreA: scoreA, scoreB: scoreB,
            status: document.getElementById("status").innerText,
            timer: document.getElementById("timer").innerText
        };
        database.ref('perlawananList/' + data.matchNumber).update(data);
        database.ref('netballLive').update(data);
    }

    window.onload = loadMatchSetup;
</script>
</body>
</html>
