<!DOCTYPE html>
<html lang="ms">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Score Bola Jaring</title>

<style>

body{

margin:0;

height:100vh;

font-family:Arial,sans-serif;

color:white;

background-image:url("background.png");

background-size:cover;

background-position:center;

background-repeat:no-repeat;

}

.overlay{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.scoreboard{

width:90%;

background:rgba(0,0,0,0.45);

padding:40px;

border-radius:30px;

}

.teams{

display:grid;

grid-template-columns:
1fr 250px 300px 250px 1fr;

align-items:center;

width:100%;

}

.team{

font-size:60px;
font-weight:bold;

text-align:center;

word-wrap:break-word;

padding:0 20px;

}

.team{

font-size:90px;
font-weight:bold;
text-align:center;

}

.score{

font-size:190px;
font-weight:bold;
text-align:center;
color:#FFD700;

}

.middle{

text-align:center;

}

.status{

font-size:45px;

font-weight:bold;

}

.timer{

font-size:90px;

font-weight:bold;

margin-top:10px;

}

</style>

</head>

<body>

<div class="overlay">

<div class="scoreboard">

<div class="teams">

<div class="team" id="teamA">
PASUKAN A
</div>

<div class="score" id="scoreA">
0
</div>

<div class="middle">

<div class="status" id="status">
SEPARUH MASA PERTAMA
</div>

<div class="timer" id="timer">
10:00
</div>

</div>

<div class="score" id="scoreB">
0
</div>

<div class="team" id="teamB">
PASUKAN B
</div>

</div>

</div>

</div>

</div>

</div>

<script>

function loadData(){

    const data = JSON.parse(
        localStorage.getItem("netballLive")
    );

    if(!data) return;

    document.getElementById("teamA").innerText =
    data.teamA;

    document.getElementById("teamB").innerText =
    data.teamB;

    document.getElementById("scoreA").innerText =
    data.scoreA;

    document.getElementById("scoreB").innerText =
    data.scoreB;

    document.getElementById("status").innerText =
    data.status;

    document.getElementById("timer").innerText =
    data.timer;

}

loadData();

setInterval(loadData,500);

</script>

</body>
</html>
